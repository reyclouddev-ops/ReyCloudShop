<!DOCTYPE html>

<html>

<head>

<title>
Produk
</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>


<div class="main">


<h1>
📦 Kelola Produk
</h1>



<div class="box">


<input id="name"
placeholder="Nama Produk">


<select id="category">

<option>Robux</option>
<option>GamePass</option>
<option>Panel Petro</option>
<option>VPS</option>
<option>Digital</option>

</select>



<input id="price"
placeholder="Harga">

<div class="product">

<img src="${p.image}">

<h2>
${p.name}
</h2>

<p>
Rp${p.price}
</p>

<button>
Beli
</button>

</div>

<button onclick="addProduct()">

Tambah Produk

</button>


</div>



<table>


<thead>

<tr>

<th>
Nama
</th>

<th>
Kategori
</th>

<th>
Harga
</th>

<th>
Aksi
</th>


</tr>

</thead>


<tbody id="list">

</tbody>


</table>



</div>


<script src="admin.js"></script>

</body>

</html>
